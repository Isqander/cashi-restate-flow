services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: feeservice
      POSTGRES_USER: feeservice
      POSTGRES_PASSWORD: feeservice
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feeservice"]
      interval: 3s
      timeout: 3s
      retries: 10

  fee-service:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/feeservice
      DB_USER: feeservice
      DB_PASSWORD: feeservice

  restate:
    image: docker.restate.dev/restatedev/restate:latest
    ports:
      - "8082:8080"
      - "9070:9070"
    depends_on:
      - fee-service
    environment:
      RESTATE_OBSERVABILITY__LOG__FILTER: "restate=info"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9070/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  register:
    image: docker.restate.dev/restatedev/restate-cli:latest
    depends_on:
      restate:
        condition: service_healthy
    entrypoint: >
      sh -c "
        restate -y --url http://restate:9070 deployments register http://fee-service:9080
      "
    restart: "no"

volumes:
  postgres_data:
